name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist on origin/main."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Serialize every release version. Per-tag groups still allow an older and
  # newer stable release to race after both inspect the same Latest pointer.
  group: release
  cancel-in-progress: false

jobs:
  # Build the Vite frontend once and share `dist/` with every downstream
  # bundler job. The frontend output is identical across macOS targets,
  # so doing it twice in the per-target matrix was pure waste. Runs on
  # ubuntu-latest because it is the cheapest runner and the build is
  # platform-agnostic.
  frontend:
    name: Build shared frontend bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_commit: ${{ steps.release_source.outputs.commit }}
      release_tag: ${{ steps.release_source.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Tag-push events already carry an immutable commit SHA. Manual
          # runs resolve their requested tag once here; every downstream job
          # then checks out the validated commit output instead of the tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate release version
        id: release_source
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          node scripts/validate-release-version.mjs "$tag"
          tag_commit=$(git rev-parse --verify "refs/tags/${tag}^{commit}")
          head_commit=$(git rev-parse --verify HEAD)
          if [[ "$head_commit" != "$tag_commit" ]]; then
            echo "checked out $head_commit, but $tag resolves to $tag_commit" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$head_commit" refs/remotes/origin/main; then
            echo "release commit $head_commit is not reachable from origin/main" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$head_commit" >> "$GITHUB_OUTPUT"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build & sign macOS bundles
    runs-on: macos-latest
    needs: frontend
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.frontend.outputs.release_commit }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Per-target shared key (default key already factors in
          # Cargo.lock + rustc version). `cache-on-failure` lets the
          # next run pick up partial progress when a non-tag build dies
          # late. Release tag refs cannot restore caches created for
          # sibling tags, so tag pushes restore only and avoid saving
          # one-off caches that churn the repository's cache quota.
          shared-key: ${{ matrix.target }}
          save-if: ${{ github.ref_type != 'tag' }}
          cache-on-failure: true

      # sccache backed by GitHub Actions cache. Speeds up COLD cargo
      # builds (when Swatinem/rust-cache misses, e.g. after Cargo.lock
      # bumps). Wraps rustc to memoize per-crate compilation outputs.
      - name: Setup sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Probe the GHA cache backend before trusting sccache. When the
      # Azure Edge layer behind `artifactcache.actions.githubusercontent.com`
      # has a regional incident (seen 2026-05-11), sccache exits 2 on its
      # very first `rustc -vV` probe and aborts the whole build. Run that
      # probe ourselves with `continue-on-error: true` so a backend outage
      # leaves the build slower (no cache) but still successful instead of
      # red.
      - name: Probe sccache GHA backend
        id: sccache_probe
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          sccache --start-server
          echo "ok=1" >> "$GITHUB_OUTPUT"

      - name: Enable sccache for this job
        if: steps.sccache_probe.outputs.ok == '1'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Pull the prebuilt Vite output from the `frontend` job into `dist/`.
      # The `tauri build` step below skips `pnpm run build` by overriding
      # `beforeBuildCommand` to only run the sidecar staging script. Keep
      # that sidecar build in the matrix because each macOS target needs
      # its own `acorn-ipc` / `acornd` binaries, but use the same Cargo
      # profile as the app build so Cargo can reuse release-ci artifacts
      # instead of compiling release sidecars and release-ci app binaries
      # back to back.
      - name: Download shared frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: dist/

      - name: Build & sign tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # CARGO_INCREMENTAL must be off — incremental compilation is
          # incompatible with sccache and silently disables caching.
          # RUSTC_WRAPPER / SCCACHE_GHA_ENABLED are set above when the
          # GHA cache backend is reachable (see "Probe sccache GHA backend").
          CARGO_INCREMENTAL: "0"
        # `--profile release-ci` swaps fat LTO + codegen-units=1 for
        # no LTO + codegen-units=32 (defined in src-tauri/Cargo.toml).
        # Output lands in target/<arch>/release-ci/ instead of release/.
        #
        # @tauri-apps/cli 2.10+ removed the top-level `--profile` flag and
        # the `updater` bundle value. Pass `--profile` to cargo via `--`,
        # and rely on `bundle.createUpdaterArtifacts: true` in
        # tauri.conf.json to emit the updater tarball alongside the app
        # bundle automatically.
        #
        # `--config` inline-overrides `build.beforeBuildCommand` so Vite
        # does NOT rebuild the frontend — we restored `dist/` from the
        # `frontend` job's artifact one step ago. The sidecar staging
        # script still runs per-target because it cross-compiles for each
        # apple triple.
        run: pnpm run tauri build --target ${{ matrix.target }} --bundles app dmg --config '{"build":{"beforeBuildCommand":"TAURI_SIDECAR_FORCE_TARGET=1 TAURI_SIDECAR_PROFILE=release-ci pnpm run build:sidecar"}}' -- --profile release-ci --locked

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          out=staged
          mkdir -p "$out"
          target="${{ matrix.target }}"
          # Custom profile name = target subdir name. Build step uses
          # `--profile release-ci`, so artifacts live under release-ci/.
          bundle_dir="src-tauri/target/${target}/release-ci/bundle"

          # Tauri produces `.app.tar.gz` / `.app.tar.gz.sig` with a
          # NON-arch-tagged name (the DMG is arch-tagged by tauri itself,
          # the updater tarball is not). Both matrix jobs would then
          # upload artifacts containing identically-named files. The
          # publish job downloads both with `merge-multiple: true`,
          # which collapses same-named files: the surviving `.tar.gz`
          # and `.sig` can end up coming from DIFFERENT jobs, so the
          # signature no longer matches the tarball bytes and Tauri's
          # updater rejects the release with "signature verification
          # failed". Fix: rename to include the arch suffix BEFORE
          # uploading, so each arch's pair survives the merge intact.
          case "$target" in
            aarch64-*) suffix="aarch64" ;;
            x86_64-*)  suffix="x86_64"  ;;
            *)         suffix="$target" ;;
          esac

          # Fail closed unless Tauri produced exactly one DMG and one matching
          # updater tarball/signature pair, then stage the pair together with
          # an architecture suffix before matrix artifacts are merged.
          node scripts/release-artifacts.mjs stage "$bundle_dir" "$out" "$suffix"

          ls -la "$out/"
          echo "dir=$out" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundles-${{ matrix.target }}
          path: ${{ steps.stage.outputs.dir }}/**
          if-no-files-found: error
          retention-days: 1

  # Manual-only benchmark of nightly Rust + `-Z share-generics` + parallel
  # rustc against the same shared frontend. Skipped on tag pushes; trigger
  # via the Actions tab when measuring whether unstable flags are worth
  # the toolchain risk. Produces no release artifact — wall-clock time in
  # the run log is the deliverable.
  build-nightly-experiment:
    name: Build (nightly share-generics experiment)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    needs: frontend
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.frontend.outputs.release_commit }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: dist/

      - name: Setup nightly Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # nightly
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: nightly-aarch64
          cache-on-failure: true

      - name: Build with share-generics + parallel rustc
        env:
          RUSTFLAGS: "-Z share-generics=y -Z threads=8"
          CARGO_INCREMENTAL: "0"
        run: pnpm run tauri build --target aarch64-apple-darwin --bundles app --config '{"build":{"beforeBuildCommand":"TAURI_SIDECAR_FORCE_TARGET=1 TAURI_SIDECAR_PROFILE=release-ci pnpm run build:sidecar"}}' -- --profile release-ci --locked

  release:
    name: Publish GitHub Release + latest.json
    needs: [frontend, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.frontend.outputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pinned release source
        env:
          EXPECTED_COMMIT: ${{ needs.frontend.outputs.release_commit }}
          TAG: ${{ needs.frontend.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch --force --no-tags origin \
            "+refs/tags/${TAG}:refs/tags/${TAG}" \
            "+refs/heads/main:refs/remotes/origin/main"
          head_commit=$(git rev-parse --verify HEAD)
          tag_commit=$(git rev-parse --verify "refs/tags/${TAG}^{commit}")
          if [[ "$head_commit" != "$EXPECTED_COMMIT" || "$tag_commit" != "$EXPECTED_COMMIT" ]]; then
            echo "release source moved: expected $EXPECTED_COMMIT, HEAD=$head_commit, $TAG=$tag_commit" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$EXPECTED_COMMIT" refs/remotes/origin/main; then
            echo "release commit $EXPECTED_COMMIT is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Download all bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bundles
          pattern: bundles-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la bundles/

      - name: Resolve tag + version
        id: meta
        env:
          TAG: ${{ needs.frontend.outputs.release_tag }}
        run: |
          set -euo pipefail
          version=$(node scripts/validate-release-version.mjs "$TAG")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Refuse existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          error_file=$(mktemp)
          if ! release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" 2>"$error_file"); then
            if grep -q "HTTP 404" "$error_file"; then
              exit 0
            fi
            cat "$error_file" >&2
            exit 1
          fi
          asset_count=$(jq '.assets | length' <<<"$release_json")
          if [[ "$asset_count" != "0" ]]; then
            echo "release $TAG already has $asset_count asset(s); refusing a mutable or mixed rerun" >&2
            exit 1
          fi

      - name: Enforce latest release order
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$TAG" == *-* ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          error_file=$(mktemp)
          if ! current_tag=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name 2>"$error_file"); then
            if grep -q "HTTP 404" "$error_file"; then
              echo "value=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            cat "$error_file" >&2
            exit 1
          fi
          node scripts/validate-release-version.mjs --assert-newer "$TAG" "$current_tag"
          echo "value=true" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: release_notes.md
        run: |
          set -euo pipefail
          # Stable patch releases carry cumulative notes for the current
          # major.minor line, so an updater jump such as 1.8.0 -> 1.8.2
          # shows the 1.8.0, 1.8.1, and 1.8.2 entries in "What's new".
          node scripts/release-notes.mjs
          echo "Notes preview (first 400 chars):"
          head -c 400 release_notes.md || true
          echo

      - name: Generate latest.json manifest
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # Build the per-platform manifest the Tauri updater plugin
          # consumes. Each platform entry needs:
          #   - signature: contents of the .app.tar.gz.sig file
          #   - url:       direct download URL for the .app.tar.gz on
          #                this release
          # The download URLs use `releases/download/<tag>/<asset>` so
          # they are stable per release; the endpoint configured in
          # tauri.conf.json points at `releases/latest/download/latest.json`
          # which always resolves to the newest tag.

          node scripts/release-artifacts.mjs inspect bundles > artifact-set.json
          arm_tar=$(jq -r .armTar artifact-set.json)
          arm_sig=$(jq -r .armSignature artifact-set.json)
          x64_tar=$(jq -r .x64Tar artifact-set.json)
          x64_sig=$(jq -r .x64Signature artifact-set.json)

          base="https://github.com/${REPO}/releases/download/${TAG}"
          arm_url="${base}/$(basename "$arm_tar")"
          x64_url="${base}/$(basename "$x64_tar")"
          arm_sig_value=$(cat "$arm_sig")
          x64_sig_value=$(cat "$x64_sig")

          jq -n \
            --arg version "$VERSION" \
            --rawfile notes release_notes.md \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg arm_url "$arm_url" \
            --arg arm_sig "$arm_sig_value" \
            --arg x64_url "$x64_url" \
            --arg x64_sig "$x64_sig_value" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub_date,
               platforms: {
                 "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                 "darwin-x86_64":  { signature: $x64_sig, url: $x64_url }
               }
             }' > latest.json

          cat latest.json

      - name: Verify release tag did not move
        env:
          EXPECTED_COMMIT: ${{ needs.frontend.outputs.release_commit }}
          TAG: ${{ needs.frontend.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch --force --no-tags origin "+refs/tags/${TAG}:refs/tags/${TAG}"
          tag_commit=$(git rev-parse --verify "refs/tags/${TAG}^{commit}")
          if [[ "$tag_commit" != "$EXPECTED_COMMIT" ]]; then
            echo "release tag moved: expected $TAG at $EXPECTED_COMMIT, found $tag_commit" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          # Use the pre-generated notes (also embedded in latest.json)
          # instead of letting the action regenerate them, so the
          # release page and the updater banner show identical text.
          body_path: release_notes.md
          files: |
            bundles/*.dmg
            bundles/*.app.tar.gz
            bundles/*.app.tar.gz.sig
            latest.json
          fail_on_unmatched_files: true
          overwrite_files: false
          # Stable releases must update GitHub's "Latest" pointer because the
          # app updater resolves latest.json through /releases/latest/download.
          # Keep prerelease tags out of that pointer.
          make_latest: ${{ steps.latest.outputs.value }}
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
