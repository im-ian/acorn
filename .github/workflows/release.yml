name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist on the branch you ran this from."
        required: true
        type: string

jobs:
  # Build the Vite frontend once and share `dist/` with every downstream
  # bundler job. The frontend output is identical across macOS targets,
  # so doing it twice in the per-target matrix was pure waste. Runs on
  # ubuntu-latest because it is the cheapest runner and the build is
  # platform-agnostic.
  frontend:
    name: Build shared frontend bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build & sign macOS bundles
    runs-on: macos-latest
    needs: frontend
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Per-target shared key (default key already factors in
          # Cargo.lock + rustc version). `cache-on-failure` lets the
          # next run pick up partial progress when a non-tag build dies
          # late. Release tag refs cannot restore caches created for
          # sibling tags, so tag pushes restore only and avoid saving
          # one-off caches that churn the repository's cache quota.
          shared-key: ${{ matrix.target }}
          save-if: ${{ github.ref_type != 'tag' }}
          cache-on-failure: true

      # sccache backed by GitHub Actions cache. Speeds up COLD cargo
      # builds (when Swatinem/rust-cache misses, e.g. after Cargo.lock
      # bumps). Wraps rustc to memoize per-crate compilation outputs.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # Probe the GHA cache backend before trusting sccache. When the
      # Azure Edge layer behind `artifactcache.actions.githubusercontent.com`
      # has a regional incident (seen 2026-05-11), sccache exits 2 on its
      # very first `rustc -vV` probe and aborts the whole build. Run that
      # probe ourselves with `continue-on-error: true` so a backend outage
      # leaves the build slower (no cache) but still successful instead of
      # red.
      - name: Probe sccache GHA backend
        id: sccache_probe
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          sccache --start-server
          echo "ok=1" >> "$GITHUB_OUTPUT"

      - name: Enable sccache for this job
        if: steps.sccache_probe.outputs.ok == '1'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Pull the prebuilt Vite output from the `frontend` job into `dist/`.
      # The `tauri build` step below skips `pnpm run build` by overriding
      # `beforeBuildCommand` to only run the sidecar staging script. Keep
      # that sidecar build in the matrix because each macOS target needs
      # its own `acorn-ipc` / `acornd` binaries, but use the same Cargo
      # profile as the app build so Cargo can reuse release-ci artifacts
      # instead of compiling release sidecars and release-ci app binaries
      # back to back.
      - name: Download shared frontend bundle
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: dist/

      - name: Build & sign tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # CARGO_INCREMENTAL must be off — incremental compilation is
          # incompatible with sccache and silently disables caching.
          # RUSTC_WRAPPER / SCCACHE_GHA_ENABLED are set above when the
          # GHA cache backend is reachable (see "Probe sccache GHA backend").
          CARGO_INCREMENTAL: "0"
        # `--profile release-ci` swaps fat LTO + codegen-units=1 for
        # no LTO + codegen-units=32 (defined in src-tauri/Cargo.toml).
        # Output lands in target/<arch>/release-ci/ instead of release/.
        #
        # @tauri-apps/cli 2.10+ removed the top-level `--profile` flag and
        # the `updater` bundle value. Pass `--profile` to cargo via `--`,
        # and rely on `bundle.createUpdaterArtifacts: true` in
        # tauri.conf.json to emit the updater tarball alongside the app
        # bundle automatically.
        #
        # `--config` inline-overrides `build.beforeBuildCommand` so Vite
        # does NOT rebuild the frontend — we restored `dist/` from the
        # `frontend` job's artifact one step ago. The sidecar staging
        # script still runs per-target because it cross-compiles for each
        # apple triple.
        run: pnpm run tauri build --target ${{ matrix.target }} --bundles app dmg --config '{"build":{"beforeBuildCommand":"TAURI_SIDECAR_PROFILE=release-ci pnpm run build:sidecar"}}' -- --profile release-ci

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          out=staged
          mkdir -p "$out"
          target="${{ matrix.target }}"
          # Custom profile name = target subdir name. Build step uses
          # `--profile release-ci`, so artifacts live under release-ci/.
          bundle_dir="src-tauri/target/${target}/release-ci/bundle"

          # Tauri produces `.app.tar.gz` / `.app.tar.gz.sig` with a
          # NON-arch-tagged name (the DMG is arch-tagged by tauri itself,
          # the updater tarball is not). Both matrix jobs would then
          # upload artifacts containing identically-named files. The
          # publish job downloads both with `merge-multiple: true`,
          # which collapses same-named files: the surviving `.tar.gz`
          # and `.sig` can end up coming from DIFFERENT jobs, so the
          # signature no longer matches the tarball bytes and Tauri's
          # updater rejects the release with "signature verification
          # failed". Fix: rename to include the arch suffix BEFORE
          # uploading, so each arch's pair survives the merge intact.
          case "$target" in
            aarch64-*) suffix="aarch64" ;;
            x86_64-*)  suffix="x86_64"  ;;
            *)         suffix="$target" ;;
          esac

          # DMG (already arch-tagged by tauri — `Acorn_<ver>_<arch>.dmg`)
          find "${bundle_dir}/dmg" -name "*.dmg" -maxdepth 2 -print0 \
            | xargs -0 -I{} cp -v {} "$out/"

          # Updater tarball + signature, renamed to add the arch suffix.
          # The publish job's `latest.json` generator already greps for
          # `aarch64` / `x86_64` in the filename, so once the names are
          # tagged here it picks the right pair per platform.
          while IFS= read -r -d '' f; do
            base=$(basename "$f" .app.tar.gz)
            cp -v "$f" "$out/${base}_${suffix}.app.tar.gz"
          done < <(find "${bundle_dir}/macos" -name "*.app.tar.gz" -maxdepth 2 -print0)
          while IFS= read -r -d '' f; do
            base=$(basename "$f" .app.tar.gz.sig)
            cp -v "$f" "$out/${base}_${suffix}.app.tar.gz.sig"
          done < <(find "${bundle_dir}/macos" -name "*.app.tar.gz.sig" -maxdepth 2 -print0)

          ls -la "$out/"
          echo "dir=$out" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bundles-${{ matrix.target }}
          path: ${{ steps.stage.outputs.dir }}/**
          if-no-files-found: error

  # Manual-only benchmark of nightly Rust + `-Z share-generics` + parallel
  # rustc against the same shared frontend. Skipped on tag pushes; trigger
  # via the Actions tab when measuring whether unstable flags are worth
  # the toolchain risk. Produces no release artifact — wall-clock time in
  # the run log is the deliverable.
  build-nightly-experiment:
    name: Build (nightly share-generics experiment)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    needs: frontend
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: dist/

      - name: Setup nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: nightly-aarch64
          cache-on-failure: true

      - name: Build with share-generics + parallel rustc
        env:
          RUSTFLAGS: "-Z share-generics=y -Z threads=8"
          CARGO_INCREMENTAL: "0"
        run: pnpm run tauri build --target aarch64-apple-darwin --bundles app --config '{"build":{"beforeBuildCommand":"TAURI_SIDECAR_PROFILE=release-ci pnpm run build:sidecar"}}' -- --profile release-ci

  release:
    name: Publish GitHub Release + latest.json
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download all bundles
        uses: actions/download-artifact@v6
        with:
          path: bundles
          pattern: bundles-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la bundles/

      - name: Resolve tag + version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: release_notes.md
        run: |
          set -euo pipefail
          # Stable patch releases carry cumulative notes for the current
          # major.minor line, so an updater jump such as 1.8.0 -> 1.8.2
          # shows the 1.8.0, 1.8.1, and 1.8.2 entries in "What's new".
          node scripts/release-notes.mjs
          echo "Notes preview (first 400 chars):"
          head -c 400 release_notes.md || true
          echo

      - name: Generate latest.json manifest
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # Build the per-platform manifest the Tauri updater plugin
          # consumes. Each platform entry needs:
          #   - signature: contents of the .app.tar.gz.sig file
          #   - url:       direct download URL for the .app.tar.gz on
          #                this release
          # The download URLs use `releases/download/<tag>/<asset>` so
          # they are stable per release; the endpoint configured in
          # tauri.conf.json points at `releases/latest/download/latest.json`
          # which always resolves to the newest tag.

          arm_tar=$(ls bundles/*.app.tar.gz | grep -E 'aarch64' | head -n1 || true)
          arm_sig=$(ls bundles/*.app.tar.gz.sig | grep -E 'aarch64' | head -n1 || true)
          x64_tar=$(ls bundles/*.app.tar.gz | grep -E 'x64|x86_64' | head -n1 || true)
          x64_sig=$(ls bundles/*.app.tar.gz.sig | grep -E 'x64|x86_64' | head -n1 || true)

          # If the bundle filenames don't carry the arch hint (older
          # tauri builds put both into a single name), fall back to the
          # only available file for both arches.
          if [[ -z "$arm_tar" || -z "$x64_tar" ]]; then
            single_tar=$(ls bundles/*.app.tar.gz | head -n1)
            single_sig=$(ls bundles/*.app.tar.gz.sig | head -n1)
            arm_tar="${arm_tar:-$single_tar}"
            arm_sig="${arm_sig:-$single_sig}"
            x64_tar="${x64_tar:-$single_tar}"
            x64_sig="${x64_sig:-$single_sig}"
          fi

          base="https://github.com/${REPO}/releases/download/${TAG}"
          arm_url="${base}/$(basename "$arm_tar")"
          x64_url="${base}/$(basename "$x64_tar")"
          arm_sig_value=$(cat "$arm_sig")
          x64_sig_value=$(cat "$x64_sig")

          jq -n \
            --arg version "$VERSION" \
            --rawfile notes release_notes.md \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg arm_url "$arm_url" \
            --arg arm_sig "$arm_sig_value" \
            --arg x64_url "$x64_url" \
            --arg x64_sig "$x64_sig_value" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub_date,
               platforms: {
                 "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                 "darwin-x86_64":  { signature: $x64_sig, url: $x64_url }
               }
             }' > latest.json

          cat latest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          # Use the pre-generated notes (also embedded in latest.json)
          # instead of letting the action regenerate them, so the
          # release page and the updater banner show identical text.
          body_path: release_notes.md
          files: |
            bundles/*.dmg
            bundles/*.app.tar.gz
            bundles/*.app.tar.gz.sig
            latest.json
          # Stable releases must update GitHub's "Latest" pointer because the
          # app updater resolves latest.json through /releases/latest/download.
          # Keep prerelease tags out of that pointer.
          make_latest: ${{ contains(steps.meta.outputs.tag, '-') && 'false' || 'true' }}
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
