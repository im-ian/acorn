name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist on the branch you ran this from."
        required: true
        type: string

jobs:
  build:
    name: Build & sign macOS bundles
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match .github/workflows/ci.yml so the GHA-managed
          # bun cache key stays stable across runs (`latest` invalidates
          # whenever upstream cuts a new release).
          bun-version: 1.3.12

      # Cache bun's package store. setup-bun does not cache install
      # output; `bun install` re-fetches every dep without this.
      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Per-target shared key (default key already factors in
          # Cargo.lock + rustc version). `cache-on-failure` lets the
          # next run pick up partial progress when a build dies late.
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      # sccache backed by GitHub Actions cache. Speeds up COLD cargo
      # builds (when Swatinem/rust-cache misses, e.g. after Cargo.lock
      # bumps). Wraps rustc to memoize per-crate compilation outputs.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build & sign tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # sccache wiring. CARGO_INCREMENTAL must be off — incremental
          # compilation is incompatible with sccache and silently
          # disables caching.
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CARGO_INCREMENTAL: "0"
        # `--profile release-ci` swaps fat LTO + codegen-units=1 for
        # thin LTO + codegen-units=16 (defined in src-tauri/Cargo.toml).
        # Output lands in target/<arch>/release-ci/ instead of release/.
        run: bun run tauri build --target ${{ matrix.target }} --profile release-ci --bundles app dmg updater

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          out=staged
          mkdir -p "$out"
          target="${{ matrix.target }}"
          # Custom profile name = target subdir name. Build step uses
          # `--profile release-ci`, so artifacts live under release-ci/.
          bundle_dir="src-tauri/target/${target}/release-ci/bundle"

          # Tauri produces `.app.tar.gz` / `.app.tar.gz.sig` with a
          # NON-arch-tagged name (the DMG is arch-tagged by tauri itself,
          # the updater tarball is not). Both matrix jobs would then
          # upload artifacts containing identically-named files. The
          # publish job downloads both with `merge-multiple: true`,
          # which collapses same-named files: the surviving `.tar.gz`
          # and `.sig` can end up coming from DIFFERENT jobs, so the
          # signature no longer matches the tarball bytes and Tauri's
          # updater rejects the release with "signature verification
          # failed". Fix: rename to include the arch suffix BEFORE
          # uploading, so each arch's pair survives the merge intact.
          case "$target" in
            aarch64-*) suffix="aarch64" ;;
            x86_64-*)  suffix="x86_64"  ;;
            *)         suffix="$target" ;;
          esac

          # DMG (already arch-tagged by tauri — `Acorn_<ver>_<arch>.dmg`)
          find "${bundle_dir}/dmg" -name "*.dmg" -maxdepth 2 -print0 \
            | xargs -0 -I{} cp -v {} "$out/"

          # Updater tarball + signature, renamed to add the arch suffix.
          # The publish job's `latest.json` generator already greps for
          # `aarch64` / `x86_64` in the filename, so once the names are
          # tagged here it picks the right pair per platform.
          while IFS= read -r -d '' f; do
            base=$(basename "$f" .app.tar.gz)
            cp -v "$f" "$out/${base}_${suffix}.app.tar.gz"
          done < <(find "${bundle_dir}/macos" -name "*.app.tar.gz" -maxdepth 2 -print0)
          while IFS= read -r -d '' f; do
            base=$(basename "$f" .app.tar.gz.sig)
            cp -v "$f" "$out/${base}_${suffix}.app.tar.gz.sig"
          done < <(find "${bundle_dir}/macos" -name "*.app.tar.gz.sig" -maxdepth 2 -print0)

          ls -la "$out/"
          echo "dir=$out" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: ${{ steps.stage.outputs.dir }}/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release + latest.json
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: bundles-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la bundles/

      - name: Resolve tag + version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Generate the same auto-notes GitHub would compose from the
          # tag, ahead of release creation, so they can be embedded into
          # `latest.json` AND used as the release body. Falls back to a
          # short "See release page" sentence if the API call fails
          # (e.g. on the very first tag, before previous_tag_name has
          # something to diff against).
          if notes=$(gh api -X POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/releases/generate-notes" \
              -f "tag_name=${TAG}" \
              --jq .body 2>/dev/null); then
            :
          else
            notes="See https://github.com/${REPO}/releases/tag/${TAG}"
          fi
          # Persist to a file rather than $GITHUB_OUTPUT so newlines and
          # markdown survive cleanly through later jq / action-gh-release
          # consumers.
          printf '%s' "$notes" > release_notes.md
          echo "Notes preview (first 400 chars):"
          head -c 400 release_notes.md || true
          echo

      - name: Generate latest.json manifest
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # Build the per-platform manifest the Tauri updater plugin
          # consumes. Each platform entry needs:
          #   - signature: contents of the .app.tar.gz.sig file
          #   - url:       direct download URL for the .app.tar.gz on
          #                this release
          # The download URLs use `releases/download/<tag>/<asset>` so
          # they are stable per release; the endpoint configured in
          # tauri.conf.json points at `releases/latest/download/latest.json`
          # which always resolves to the newest tag.

          arm_tar=$(ls bundles/*.app.tar.gz | grep -E 'aarch64' | head -n1 || true)
          arm_sig=$(ls bundles/*.app.tar.gz.sig | grep -E 'aarch64' | head -n1 || true)
          x64_tar=$(ls bundles/*.app.tar.gz | grep -E 'x64|x86_64' | head -n1 || true)
          x64_sig=$(ls bundles/*.app.tar.gz.sig | grep -E 'x64|x86_64' | head -n1 || true)

          # If the bundle filenames don't carry the arch hint (older
          # tauri builds put both into a single name), fall back to the
          # only available file for both arches.
          if [[ -z "$arm_tar" || -z "$x64_tar" ]]; then
            single_tar=$(ls bundles/*.app.tar.gz | head -n1)
            single_sig=$(ls bundles/*.app.tar.gz.sig | head -n1)
            arm_tar="${arm_tar:-$single_tar}"
            arm_sig="${arm_sig:-$single_sig}"
            x64_tar="${x64_tar:-$single_tar}"
            x64_sig="${x64_sig:-$single_sig}"
          fi

          base="https://github.com/${REPO}/releases/download/${TAG}"
          arm_url="${base}/$(basename "$arm_tar")"
          x64_url="${base}/$(basename "$x64_tar")"
          arm_sig_value=$(cat "$arm_sig")
          x64_sig_value=$(cat "$x64_sig")

          jq -n \
            --arg version "$VERSION" \
            --rawfile notes release_notes.md \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg arm_url "$arm_url" \
            --arg arm_sig "$arm_sig_value" \
            --arg x64_url "$x64_url" \
            --arg x64_sig "$x64_sig_value" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub_date,
               platforms: {
                 "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                 "darwin-x86_64":  { signature: $x64_sig, url: $x64_url }
               }
             }' > latest.json

          cat latest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          # Use the pre-generated notes (also embedded in latest.json)
          # instead of letting the action regenerate them, so the
          # release page and the updater banner show identical text.
          body_path: release_notes.md
          files: |
            bundles/*.dmg
            bundles/*.app.tar.gz
            bundles/*.app.tar.gz.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
