[package]
name = "acorn"
version = "1.0.8"
description = "Acorn — orchestrate parallel Claude Code sessions across isolated git worktrees"
authors = ["im-ian"]
edition = "2021"
default-run = "acorn"

[lib]
name = "acorn_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# Companion CLI that talks to the running Acorn app over a Unix domain
# socket. Built from the same crate so the protocol types in `ipc::proto`
# stay in lockstep between the in-process server and the out-of-process
# client without a third workspace member.
[[bin]]
name = "acorn-ipc"
path = "src/bin/acorn-ipc.rs"

# Existing Tauri entry binary — Cargo defaults `name = "acorn"` based on the
# package name, but once we add a second `[[bin]]` we must spell both out so
# Cargo does not auto-discover the new bin as the only target.
[[bin]]
name = "acorn"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"
tauri-plugin-single-instance = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
anyhow = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
git2 = { version = "0.20", default-features = false, features = ["vendored-libgit2"] }
portable-pty = "0.9"
parking_lot = "0.12"
dashmap = "6"
directories = "5"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
base64 = "0.22"
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2"
clap = { version = "4", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

# CI release profile — trades a small binary-size increase for much faster
# compile time. Used by `.github/workflows/release.yml`. Local releases
# (developers running `bun run tauri build`) still use [profile.release]
# above, so shipped artifact size is unchanged for ad-hoc builds.
[profile.release-ci]
inherits = "release"
lto = "thin"
codegen-units = 16
